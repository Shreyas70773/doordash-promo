<script type="text/babel">
const {useRef,useMemo} = React;

/* ═══════════════════════════════════════════════════════════════════════════
   ANIMATION FRAMEWORK (from animations.jsx)
   ═════════════════════════════════════════════════════════════════════════ */

// ── Easing functions (hand-rolled, Popmotion-style) ─────────────────────────
const Easing = {
  linear: (t) => t,
  easeInQuad:    (t) => t * t,
  easeOutQuad:   (t) => t * (2 - t),
  easeInOutQuad: (t) => (t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t),
  easeInCubic:    (t) => t * t * t,
  easeOutCubic:   (t) => (--t) * t * t + 1,
  easeInOutCubic: (t) => (t < 0.5 ? 4 * t * t * t : (t - 1) * (2 * t - 2) * (2 * t - 2) + 1),
  easeInQuart:    (t) => t * t * t * t,
  easeOutQuart:   (t) => 1 - (--t) * t * t * t,
  easeInOutQuart: (t) => (t < 0.5 ? 8 * t * t * t * t : 1 - 8 * (--t) * t * t * t),
  easeInExpo:  (t) => (t === 0 ? 0 : Math.pow(2, 10 * (t - 1))),
  easeOutExpo: (t) => (t === 1 ? 1 : 1 - Math.pow(2, -10 * t)),
  easeInOutExpo: (t) => {
    if (t === 0) return 0;
    if (t === 1) return 1;
    if (t < 0.5) return 0.5 * Math.pow(2, 20 * t - 10);
    return 1 - 0.5 * Math.pow(2, -20 * t + 10);
  },
  easeInSine:    (t) => 1 - Math.cos((t * Math.PI) / 2),
  easeOutSine:   (t) => Math.sin((t * Math.PI) / 2),
  easeInOutSine: (t) => -(Math.cos(Math.PI * t) - 1) / 2,
  easeOutBack: (t) => {
    const c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  },
  easeInBack: (t) => {
    const c1 = 1.70158, c3 = c1 + 1;
    return c3 * t * t * t - c1 * t * t;
  },
  easeInOutBack: (t) => {
    const c1 = 1.70158, c2 = c1 * 1.525;
    return t < 0.5
      ? (Math.pow(2 * t, 2) * ((c2 + 1) * 2 * t - c2)) / 2
      : (Math.pow(2 * t - 2, 2) * ((c2 + 1) * (t * 2 - 2) + c2) + 2) / 2;
  },
  easeOutElastic: (t) => {
    const c4 = (2 * Math.PI) / 3;
    if (t === 0) return 0;
    if (t === 1) return 1;
    return Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c4) + 1;
  },
};

const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

function interpolate(input, output, ease = Easing.linear) {
  return (t) => {
    if (t <= input[0]) return output[0];
    if (t >= input[input.length - 1]) return output[output.length - 1];
    for (let i = 0; i < input.length - 1; i++) {
      if (t >= input[i] && t <= input[i + 1]) {
        const span = input[i + 1] - input[i];
        const local = span === 0 ? 0 : (t - input[i]) / span;
        const easeFn = Array.isArray(ease) ? (ease[i] || Easing.linear) : ease;
        const eased = easeFn(local);
        return output[i] + (output[i + 1] - output[i]) * eased;
      }
    }
    return output[output.length - 1];
  };
}

function animate({ from = 0, to = 1, start = 0, end = 1, ease = Easing.easeInOutCubic }) {
  return (t) => {
    if (t <= start) return from;
    if (t >= end) return to;
    const local = (t - start) / (end - start);
    return from + (to - from) * ease(local);
  };
}

const TimelineContext = React.createContext({ time: 0, duration: 10, playing: false });
const useTime = () => React.useContext(TimelineContext).time;
const useTimeline = () => React.useContext(TimelineContext);

const SpriteContext = React.createContext({ localTime: 0, progress: 0, duration: 0 });
const useSprite = () => React.useContext(SpriteContext);

function Sprite({ start = 0, end = Infinity, children, keepMounted = false }) {
  const { time } = useTimeline();
  const visible = time >= start && time <= end;
  if (!visible && !keepMounted) return null;

  const duration = end - start;
  const localTime = Math.max(0, time - start);
  const progress = duration > 0 && isFinite(duration)
    ? clamp(localTime / duration, 0, 1)
    : 0;

  const value = { localTime, progress, duration, visible };

  return (
    <SpriteContext.Provider value={value}>
      {typeof children === 'function' ? children(value) : children}
    </SpriteContext.Provider>
  );
}

function TextSprite({
  text,
  x = 0, y = 0,
  size = 48,
  color = '#111',
  font = 'Inter, system-ui, sans-serif',
  weight = 600,
  entryDur = 0.45,
  exitDur = 0.35,
  entryEase = Easing.easeOutBack,
  exitEase = Easing.easeInCubic,
  align = 'left',
  letterSpacing = '-0.01em',
}) {
  const { localTime, duration } = useSprite();
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let ty = 0;

  if (localTime < entryDur) {
    const t = entryEase(clamp(localTime / entryDur, 0, 1));
    opacity = t;
    ty = (1 - t) * 16;
  } else if (localTime > exitStart) {
    const t = exitEase(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    ty = -t * 8;
  }

  const translateX = align === 'center' ? '-50%' : align === 'right' ? '-100%' : '0';

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      transform: `translate(${translateX}, ${ty}px)`,
      opacity,
      fontFamily: font,
      fontSize: size,
      fontWeight: weight,
      color,
      letterSpacing,
      whiteSpace: 'pre',
      lineHeight: 1.1,
      willChange: 'transform, opacity',
    }}>
      {text}
    </div>
  );
}

function ImageSprite({
  src,
  x = 0, y = 0,
  width = 400, height = 300,
  entryDur = 0.6,
  exitDur = 0.4,
  kenBurns = false,
  kenBurnsScale = 1.08,
  radius = 12,
  fit = 'cover',
  placeholder = null,
}) {
  const { localTime, duration } = useSprite();
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let scale = 1;

  if (localTime < entryDur) {
    const t = Easing.easeOutCubic(clamp(localTime / entryDur, 0, 1));
    opacity = t;
    scale = 0.96 + 0.04 * t;
  } else if (localTime > exitStart) {
    const t = Easing.easeInCubic(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    scale = (kenBurns ? kenBurnsScale : 1) + 0.02 * t;
  } else if (kenBurns) {
    const holdSpan = exitStart - entryDur;
    const holdT = holdSpan > 0 ? (localTime - entryDur) / holdSpan : 0;
    scale = 1 + (kenBurnsScale - 1) * holdT;
  }

  const content = placeholder ? (
    <div style={{
      width: '100%', height: '100%',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      background: 'repeating-linear-gradient(135deg, #e9e6df 0 10px, #dcd8cf 10px 20px)',
      color: '#6b6458',
      fontFamily: 'JetBrains Mono, ui-monospace, monospace',
      fontSize: 13,
      letterSpacing: '0.04em',
      textTransform: 'uppercase',
    }}>
      {placeholder.label || 'image'}
    </div>
  ) : (
    <img src={src} alt="" style={{ width: '100%', height: '100%', objectFit: fit, display: 'block' }} />
  );

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      width, height,
      opacity,
      transform: `scale(${scale})`,
      transformOrigin: 'center',
      borderRadius: radius,
      overflow: 'hidden',
      willChange: 'transform, opacity',
    }}>
      {content}
    </div>
  );
}

function RectSprite({
  x = 0, y = 0,
  width = 100, height = 100,
  color = '#111',
  radius = 8,
  entryDur = 0.4,
  exitDur = 0.3,
  render,
}) {
  const spriteCtx = useSprite();
  const { localTime, duration } = spriteCtx;
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let scale = 1;

  if (localTime < entryDur) {
    const t = Easing.easeOutBack(clamp(localTime / entryDur, 0, 1));
    opacity = clamp(localTime / entryDur, 0, 1);
    scale = 0.4 + 0.6 * t;
  } else if (localTime > exitStart) {
    const t = Easing.easeInQuad(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    scale = 1 - 0.15 * t;
  }

  const overrides = render ? render(spriteCtx) : {};

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      width, height,
      background: color,
      borderRadius: radius,
      opacity,
      transform: `scale(${scale})`,
      transformOrigin: 'center',
      willChange: 'transform, opacity',
      ...overrides,
    }} />
  );
}

function Stage({
  width = 1280,
  height = 720,
  duration = 10,
  background = '#f6f4ef',
  fps = 60,
  loop = true,
  autoplay = true,
  persistKey = 'animstage',
  children,
}) {
  const [time, setTime] = React.useState(() => {
    try {
      const v = parseFloat(localStorage.getItem(persistKey + ':t') || '0');
      return isFinite(v) ? clamp(v, 0, duration) : 0;
    } catch { return 0; }
  });
  const [playing, setPlaying] = React.useState(autoplay);
  const [hoverTime, setHoverTime] = React.useState(null);
  const [scale, setScale] = React.useState(1);

  const stageRef = React.useRef(null);
  const canvasRef = React.useRef(null);
  const rafRef = React.useRef(null);
  const lastTsRef = React.useRef(null);

  React.useEffect(() => {
    try { localStorage.setItem(persistKey + ':t', String(time)); } catch {}
  }, [time, persistKey]);

  React.useEffect(() => {
    if (!stageRef.current) return;
    const el = stageRef.current;
    const measure = () => {
      const barH = 44;
      const s = Math.min(
        el.clientWidth / width,
        (el.clientHeight - barH) / height
      );
      setScale(Math.max(0.05, s));
    };
    measure();
    const ro = new ResizeObserver(measure);
    ro.observe(el);
    window.addEventListener('resize', measure);
    return () => {
      ro.disconnect();
      window.removeEventListener('resize', measure);
    };
  }, [width, height]);

  React.useEffect(() => {
    if (!playing) {
      lastTsRef.current = null;
      return;
    }
    const step = (ts) => {
      if (lastTsRef.current == null) lastTsRef.current = ts;
      const dt = (ts - lastTsRef.current) / 1000;
      lastTsRef.current = ts;
      setTime((t) => {
        let next = t + dt;
        if (next >= duration) {
          if (loop) next = next % duration;
          else { next = duration; setPlaying(false); }
        }
        return next;
      });
      rafRef.current = requestAnimationFrame(step);
    };
    rafRef.current = requestAnimationFrame(step);
    return () => {
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
      lastTsRef.current = null;
    };
  }, [playing, duration, loop]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
      if (e.code === 'Space') {
        e.preventDefault();
        setPlaying(p => !p);
      } else if (e.code === 'ArrowLeft') {
        setTime(t => clamp(t - (e.shiftKey ? 1 : 0.1), 0, duration));
      } else if (e.code === 'ArrowRight') {
        setTime(t => clamp(t + (e.shiftKey ? 1 : 0.1), 0, duration));
      } else if (e.key === '0' || e.code === 'Home') {
        setTime(0);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [duration]);

  const displayTime = hoverTime != null ? hoverTime : time;

  const ctxValue = React.useMemo(
    () => ({ time: displayTime, duration, playing, setTime, setPlaying }),
    [displayTime, duration, playing]
  );

  return (
    <div
      ref={stageRef}
      style={{
        position: 'absolute', inset: 0,
        display: 'flex', flexDirection: 'column',
        alignItems: 'center',
        background: '#0a0a0a',
        fontFamily: 'Inter, system-ui, sans-serif',
      }}
    >
      <div style={{
        flex: 1,
        width: '100%',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        overflow: 'hidden',
        minHeight: 0,
      }}>
        <div
          ref={canvasRef}
          style={{
            width, height,
            background,
            position: 'relative',
            transform: `scale(${scale})`,
            transformOrigin: 'center',
            flexShrink: 0,
            boxShadow: '0 20px 60px rgba(0,0,0,0.4)',
            overflow: 'hidden',
          }}
        >
          <TimelineContext.Provider value={ctxValue}>
            {children}
          </TimelineContext.Provider>
        </div>
      </div>

      <PlaybackBar
        time={displayTime}
        actualTime={time}
        duration={duration}
        playing={playing}
        onPlayPause={() => setPlaying(p => !p)}
        onReset={() => { setTime(0); }}
        onSeek={(t) => setTime(t)}
        onHover={(t) => setHoverTime(t)}
      />
    </div>
  );
}

function PlaybackBar({ time, duration, playing, onPlayPause, onReset, onSeek, onHover }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);

  const timeFromEvent = React.useCallback((e) => {
    const rect = trackRef.current.getBoundingClientRect();
    const x = clamp((e.clientX - rect.left) / rect.width, 0, 1);
    return x * duration;
  }, [duration]);

  const onTrackMove = (e) => {
    if (!trackRef.current) return;
    const t = timeFromEvent(e);
    if (dragging) {
      onSeek(t);
    } else {
      onHover(t);
    }
  };

  const onTrackLeave = () => {
    if (!dragging) onHover(null);
  };

  const onTrackDown = (e) => {
    setDragging(true);
    const t = timeFromEvent(e);
    onSeek(t);
    onHover(null);
  };

  React.useEffect(() => {
    if (!dragging) return;
    const onUp = () => setDragging(false);
    const onMove = (e) => {
      if (!trackRef.current) return;
      const t = timeFromEvent(e);
      onSeek(t);
    };
    window.addEventListener('mouseup', onUp);
    window.addEventListener('mousemove', onMove);
    return () => {
      window.removeEventListener('mouseup', onUp);
      window.removeEventListener('mousemove', onMove);
    };
  }, [dragging, timeFromEvent, onSeek]);

  const pct = duration > 0 ? (time / duration) * 100 : 0;
  const fmt = (t) => {
    const total = Math.max(0, t);
    const m = Math.floor(total / 60);
    const s = Math.floor(total % 60);
    const cs = Math.floor((total * 100) % 100);
    return `${String(m).padStart(1, '0')}:${String(s).padStart(2, '0')}.${String(cs).padStart(2, '0')}`;
  };

  const mono = 'JetBrains Mono, ui-monospace, SFMono-Regular, monospace';

  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 12,
      padding: '8px 16px',
      background: 'rgba(20,20,20,0.92)',
      borderTop: '1px solid rgba(255,255,255,0.08)',
      width: '100%',
      maxWidth: 680,
      alignSelf: 'center',
      borderRadius: 8,
      color: '#f6f4ef',
      fontFamily: 'Inter, system-ui, sans-serif',
      userSelect: 'none',
      flexShrink: 0,
    }}>
      <IconButton onClick={onReset} title="Return to start (0)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 2v10M12 2L5 7l7 5V2z" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
        </svg>
      </IconButton>
      <IconButton onClick={onPlayPause} title="Play/pause (space)">
        {playing ? (
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <rect x="3" y="2" width="3" height="10" fill="currentColor"/>
            <rect x="8" y="2" width="3" height="10" fill="currentColor"/>
          </svg>
        ) : (
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M3 2l9 5-9 5V2z" fill="currentColor"/>
          </svg>
        )}
      </IconButton>

      <div style={{
        fontFamily: mono,
        fontSize: 12,
        fontVariantNumeric: 'tabular-nums',
        width: 64, textAlign: 'right',
        color: '#f6f4ef',
      }}>
        {fmt(time)}
      </div>

      <div
        ref={trackRef}
        onMouseMove={onTrackMove}
        onMouseLeave={onTrackLeave}
        onMouseDown={onTrackDown}
        style={{
          flex: 1,
          height: 22,
          position: 'relative',
          cursor: 'pointer',
          display: 'flex', alignItems: 'center',
        }}
      >
        <div style={{
          position: 'absolute',
          left: 0, right: 0, height: 4,
          background: 'rgba(255,255,255,0.12)',
          borderRadius: 2,
        }}/>
        <div style={{
          position: 'absolute',
          left: 0, width: `${pct}%`, height: 4,
          background: 'oklch(72% 0.12 250)',
          borderRadius: 2,
        }}/>
        <div style={{
          position: 'absolute',
          left: `${pct}%`, top: '50%',
          width: 12, height: 12,
          marginLeft: -6, marginTop: -6,
          background: '#fff',
          borderRadius: 6,
          boxShadow: '0 2px 4px rgba(0,0,0,0.4)',
        }}/>
      </div>

      <div style={{
        fontFamily: mono,
        fontSize: 12,
        fontVariantNumeric: 'tabular-nums',
        width: 64, textAlign: 'left',
        color: 'rgba(246,244,239,0.55)',
      }}>
        {fmt(duration)}
      </div>
    </div>
  );
}

function IconButton({ children, onClick, title }) {
  const [hover, setHover] = React.useState(false);
  return (
    <button
      onClick={onClick}
      title={title}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        width: 28, height: 28,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        background: hover ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.04)',
        border: '1px solid rgba(255,255,255,0.1)',
        borderRadius: 6,
        color: '#f6f4ef',
        cursor: 'pointer',
        padding: 0,
        transition: 'background 120ms',
      }}
    >
      {children}
    </button>
  );
}

/* ═════════════════════════════════════════════════════════════════════════
   ANIMATION SCENES (from original HTML)
   ═════════════════════════════════════════════════════════════════════════ */

/* ─── palette ─── */
const RED    = '#FF3008';
const LIME   = '#C8FF47';
const YELLOW = '#FFE600';
const PINK   = '#FF2979';
const WHITE  = '#FFFFFF';
const LOGO   = 'uploads/pasted-1776883533204-0.png';
const DM     = '"DM Sans",-apple-system,BlinkMacSystemFont,sans-serif';
const BANG   = '"Bangers",cursive';
const MONO   = '"Space Mono",monospace';
const TOTAL  = 25;

/* ─── math ─── */
const cl=(v,a,b)=>Math.max(a,Math.min(b,v));
const nm=(t,s,e)=>cl((t-s)/(e-s),0,1);
const lr=(a,b,t)=>a+(b-a)*t;
function eop(t,s,e){return Easing.easeOutExpo(nm(t,s,e));}
function eob(t,s,e){return Easing.easeOutBack(nm(t,s,e));}
function eio(t,s,e){return Easing.easeInOutExpo(nm(t,s,e));}
function eiq(t,s,e){return Easing.easeInOutQuad(nm(t,s,e));}

function Frame1({t}){
  const logoIn   = eob(t, 0.1, 1.1);
  const logoMov  = eio(t, 1.8, 3.0);
  const exitP    = eio(t, 5.1, 5.6);

  const blobs = [
    {color:RED,   x:'72%',  y:'10%', w:340, h:260, d:1.2},
    {color:LIME,  x:'5%',   y:'55%', w:220, h:200, d:1.6},
    {color:YELLOW,x:'60%',  y:'72%', w:280, h:200, d:2.0},
    {color:PINK,  x:'82%',  y:'42%', w:190, h:190, d:2.4},
  ];

  const words = [
    {text:'Wait.', font:BANG, size:180, color:RED,    x:'11%', y:'18%', delay:1.9, dur:0.35},
    {text:'Something', font:DM,   size:88,  color:'#111', x:'9%',  y:'36%', delay:2.4, dur:0.4,  weight:900, italic:true},
    {text:'just',      font:BANG, size:130, color:RED,    x:'38%', y:'36%', delay:2.7, dur:0.3},
    {text:'arrived.',  font:DM,   size:88,  color:'#111', x:'9%',  y:'56%', delay:3.0, dur:0.4,  weight:900},
    {text:'for',       font:DM,   size:52,  color:'rgba(0,0,0,0.32)', x:'9%', y:'69%', delay:3.4, dur:0.4, weight:300, letter:'0.22em'},
    {text:'YOU.',      font:BANG, size:160, color:PINK,   x:'9%',  y:'76%', delay:3.55, dur:0.35},
    {text:'→',         font:BANG, size:110, color:PINK,   x:'54%', y:'78%', delay:3.7,  dur:0.3},
  ];

  return (
    <div style={{width:'100%',height:'100%',background:WHITE,position:'relative',overflow:'hidden',opacity:1-exitP}}>
      <div style={{position:'absolute',inset:0,backgroundImage:`linear-gradient(rgba(0,0,0,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,0.03) 1px,transparent 1px)`,backgroundSize:'64px 64px'}}/>

      <div style={{
        position:'absolute', right:'6%', top:'50%',
        transform:'translateY(-50%)',
        opacity: eop(t,3.0,4.0),
        zIndex:5,
      }}>
        <div style={{fontFamily:MONO,fontSize:18,color:'rgba(0,0,0,0.22)',letterSpacing:'0.24em',textTransform:'uppercase',marginBottom:28,writingMode:'vertical-rl',transform:'rotate(180deg)',height:280,display:'flex',alignItems:'center',justifyContent:'center'}}>Play · For · Plates · 2025</div>
        <div style={{width:2,height:200,background:`linear-gradient(${RED},${PINK})`,margin:'0 auto',opacity:0.35}}/>  
      </div>
      {blobs.map((b,i)=>{
        const bp = eop(t, b.d, b.d+0.6);
        return (
          <div key={i} style={{
            position:'absolute', left:b.x, top:b.y,
            width:b.w, height:b.h,
            borderRadius:'50%',
            background:b.color,
            opacity: bp*0.18,
            filter:'blur(60px)',
            transform:`scale(${0.5+bp*0.5})`,
          }}/>
        );
      })}

      <div style={{
        position:'absolute',
        left: lr(50, 7, logoMov)+'%',
        top:  lr(50, 7, logoMov)+'%',
        transform:`translate(${logoMov>0.5?'0':'-50%'},${logoMov>0.5?'0':'-50%'}) scale(${lr(1.0,0.6,logoMov)*logoIn})`,
        opacity: logoIn,
        display:'flex',flexDirection:'column',alignItems:'center',gap:16,
        transition:'none',
        zIndex:10,
      }}>
        <img src={LOGO} style={{width:lr(280,130,logoMov),height:lr(280,130,logoMov),objectFit:'contain'}}/>
        <div style={{fontFamily:DM,fontWeight:800,fontSize:lr(42,22,logoMov),letterSpacing:'0.16em',color:'#111',opacity:eop(t,1.0,1.9)}}> DOORDASH</div>
      </div>

      {words.map((w,i)=>{
        const wp = eob(t, w.delay, w.delay+w.dur);
        return (
          <div key={i} style={{
            position:'absolute',
            left: w.x, top: w.y,
            fontFamily:w.font, fontWeight:w.weight||400,
            fontSize:w.size, color:w.color,
            letterSpacing:w.letter||'-0.01em',
            fontStyle:w.italic?'italic':'normal',
            lineHeight:1,
            opacity: wp,
            transform:`translateY(${(1-wp)*28}px) rotate(${(1-wp)*-3}deg)`,
            zIndex:20,
          }}>{w.text}</div>
        );
      })}
    </div>
  );
}

function TransitionA({t}){
  const shards=[
    {color:RED,   delay:0,    skew:-14, top:'-40%', h:'65%'},
    {color:YELLOW,delay:0.05, skew:-18, top:'-8%',  h:'60%'},
    {color:PINK,  delay:0.10, skew:-14, top:'25%',  h:'55%'},
    {color:RED,   delay:0.14, skew:-16, top:'55%',  h:'60%'},
    {color:YELLOW,delay:0.18, skew:-12, top:'82%',  h:'50%'},
  ];
  return shards.map((s,i)=>{
    const raw = nm(t,5.0,6.6);
    const sp = Easing.easeInOutExpo(cl((raw-s.delay)/0.72,0,1));
    if(sp<=0||sp>=1) return null;
    return (
      <div key={i} style={{
        position:'absolute', top:s.top, left:0,
        height:s.h, width:'165%', background:s.color,
        transform:`skewY(${s.skew}deg) translateX(${lr(-115,125,sp)}%)`,
        transformOrigin:'left center', zIndex:50,
      }}/>
    );
  });
}

function Frame2({t}){
  const exitP = eio(t, 11.4, 12.1);
  const words = [
    {w:'PLAY',  d:6.3, color:WHITE},
    {w:'FOR',   d:6.7, color:YELLOW},
    {w:'PLATES',d:7.1, color:WHITE},
  ];
  const subP  = eop(t, 7.8, 8.8);
  const tagP  = eop(t, 8.8, 9.6);

  return (
    <div style={{width:'100%',height:'100%',background:RED,position:'relative',overflow:'hidden',display:'flex',alignItems:'center'}}>
      <div style={{
        position:'absolute',right:-80,top:-120,
        fontFamily:BANG,fontSize:900,color:'rgba(255,255,255,0.07)',
        lineHeight:1,pointerEvents:'none',userSelect:'none',
        transform:`translateX(${exitP*80}px)`,
      }}>P</div>

      <div style={{padding:'0 120px 0 120px',position:'relative',zIndex:5,width:'100%',transform:`translateX(${-exitP*60}px)`}}>
        <div style={{fontFamily:MONO,fontSize:20,color:'rgba(255,255,255,0.50)',letterSpacing:'0.24em',textTransform:'uppercase',marginBottom:40,opacity:eop(t,6.1,6.5)}}>
          DoorDash — New Feature
        </div>

        {words.map(({w,d,color})=>{
          const wp = eob(t, d, d+0.5);
          return (
            <div key={w} style={{overflow:'hidden',display:'block'}}>
              <div style={{
                fontFamily:BANG,fontSize:120,lineHeight:0.88,
                color,letterSpacing:'0.01em',
                transform:`translateY(${(1-wp)*108}%)`,
                display:'block',
              }}>{w}</div>
            </div>
          );
        })}

        <div style={{
          marginTop:48,fontFamily:DM,fontWeight:300,fontSize:44,
          color:'rgba(255,255,255,0.82)',lineHeight:1.55,
          opacity:subP,transform:`translateY(${(1-subP)*20}px)`,
        }}>Play games.<br/><span style={{fontWeight:800,color:WHITE}}>Win real discounts.</span></div>

        <div style={{
          marginTop:48,display:'inline-flex',alignItems:'center',gap:18,
          padding:'18px 40px',background:'rgba(255,255,255,0.14)',
          borderRadius:60,border:'1.5px solid rgba(255,255,255,0.25)',
          opacity:tagP,transform:`translateY(${(1-tagP)*16}px)`,
        }}>
          <div style={{width:12,height:12,borderRadius:'50%',background:YELLOW,boxShadow:`0 0 14px ${YELLOW}`}}/>
          <span style={{fontFamily:MONO,fontSize:20,color:WHITE,letterSpacing:'0.10em'}}>SCORE HIGH — PAY LESS</span>
        </div>
      </div>

      <div style={{
        position:'absolute',right:80,top:'50%',
        transform:`translateY(-50%) rotate(90deg)`,
        fontFamily:DM,fontWeight:700,fontSize:18,
        color:'rgba(255,255,255,0.18)',letterSpacing:'0.32em',textTransform:'uppercase',
        whiteSpace:'nowrap',opacity:tagP,
      }}>Play for Plates — DoorDash — 2025</div>
    </div>
  );
}

function TransitionB({t}){
  if(t < 11.8 || t >= 13.05) return null;
  const close = eio(t, 11.8, 12.45);
  const open  = eio(t, 12.45, 13.05);

  const rClose = lr(200, 0, close);
  const rOpen  = lr(0, 200, open);
  const r      = close < 1 ? rClose : rOpen;
  const bg     = close < 1 ? RED : LIME;

  return (
    <div style={{
      position:'absolute',inset:0,zIndex:55,
      background: bg,
      clipPath:`circle(${r}vmax at 50% 50%)`,
      pointerEvents:'none',
    }}>
      <div style={{
        position:'absolute',top:'50%',left:'50%',
        width:`${r*2+6}vmax`,height:`${r*2+6}vmax`,
        border:`3px solid rgba(0,0,0,0.25)`,
        borderRadius:'50%',
        transform:'translate(-50%,-50%)',
      }}/>
      <div style={{
        position:'absolute',top:'50%',left:'50%',
        width:`${r*2+16}vmax`,height:`${r*2+16}vmax`,
        border:`1px solid rgba(0,0,0,0.12)`,
        borderRadius:'50%',
        transform:'translate(-50%,-50%)',
      }}/>
    </div>
  );
}

const EMOJIS = ['🦄','🍕','🌮','🍔','🍣','🍩'];
const CARDS  = [...EMOJIS,...EMOJIS];

const FLIPS = [
  {card:0,  t:0.5},
  {card:6,  t:1.0},
  {card:2,  t:1.7},
  {card:9,  t:2.2},
  {card:9,  t:2.7},
  {card:2,  t:2.8},
  {card:1,  t:3.3},
  {card:7,  t:3.8},
  {card:4,  t:4.4},
  {card:10, t:4.9},
  {card:3,  t:5.5},
  {card:9,  t:6.0},
];

function MemCard({emoji,state,flashAge}){
  const face = state==='face'||state==='matched';
  const glow = state==='matched';
  const popS = glow && flashAge<0.6 ? 1+Easing.easeOutBack(cl(1-flashAge/0.6,0,1))*0.14 : 1;
  return (
    <div style={{width:118,height:148,perspective:700,transform:`scale(${popS})`}}>
      <div style={{
        width:'100%',height:'100%',position:'relative',
        transformStyle:'preserve-3d',
        transform:`rotateY(${face?180:0}deg)`,
        transition:'transform 0.38s cubic-bezier(0.4,0,0.2,1)',
      }}>
        <div style={{
          position:'absolute',inset:0,backfaceVisibility:'hidden',
          background:'rgba(255,255,255,0.15)',
          borderRadius:20,border:'1.5px solid rgba(255,255,255,0.25)',
          display:'flex',alignItems:'center',justifyContent:'center',
          boxShadow:'0 6px 24px rgba(0,0,0,0.15)',
        }}>
          <div style={{width:44,height:44,borderRadius:12,background:'rgba(255,255,255,0.18)',border:'1.5px solid rgba(255,255,255,0.20)'}}/>
        </div>
        <div style={{
          position:'absolute',inset:0,backfaceVisibility:'hidden',
          transform:'rotateY(180deg)',
          background: glow ? 'rgba(255,255,255,0.96)' : WHITE,
          borderRadius:20,
          border: glow ? `2.5px solid ${RED}` : '1.5px solid rgba(0,0,0,0.06)',
          display:'flex',alignItems:'center',justifyContent:'center',
          fontSize:80,
          boxShadow: glow ? `0 0 0 4px ${RED}55, 0 12px 48px ${RED}44` : '0 8px 28px rgba(0,0,0,0.20)',
        }}>{emoji}</div>
      </div>
    </div>
  );
}

function Frame3({t}){
  const gs  = 13.0;
  const gT  = t - gs;
  const headerIn = eop(t, 13.0, 13.8);
  const exitP    = eio(t, 19.3, 20.1);

  let _s = CARDS.map(()=>'down');
  FLIPS.forEach(f=>{
    if(gT < f.t) return;
    if(_s[f.card]==='matched') return;
    _s[f.card] = _s[f.card]==='down' ? 'face' : 'down';
    const fi = _s.map((st,i)=>st==='face'?i:null).filter(x=>x!==null);
    if(fi.length===2){ const [a,b]=fi; if(CARDS[a]===CARDS[b]){_s[a]='matched';_s[b]='matched';} }
  });
  const states = _s;
  const matchedCount = states.filter(x=>x==='matched').length/2;
  const score = Math.floor(matchedCount)*350;
  const popScale = score>0 ? 1.12 : 1;

  const matchFlashAge = CARDS.map((_,i)=>{
    if(states[i]!=='matched') return 99;
    const matchFlip = FLIPS.slice().reverse().find(f=>f.card===i && gT>f.t);
    return matchFlip ? gT - matchFlip.t : 99;
  });

  return (
    <div style={{
      width:'100%',height:'100%',background:LIME,
      position:'relative',overflow:'hidden',
      opacity: 1-exitP,
    }}>
      <div style={{position:'absolute',right:-120,top:-120,width:500,height:500,borderRadius:'50%',background:'rgba(255,255,255,0.25)',pointerEvents:'none'}}/>
      <div style={{position:'absolute',left:-80,bottom:-100,width:360,height:360,borderRadius:'50%',background:'rgba(255,48,8,0.12)',pointerEvents:'none'}}/>

      <div style={{
        position:'absolute',left:0,top:0,bottom:0,width:480,
        display:'flex',flexDirection:'column',
        justifyContent:'center',padding:'0 60px 0 80px',
        transform:`translateX(${-exitP*50}px)`,
        opacity:headerIn,
      }}>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:40}}>
          <div style={{width:40,height:40,background:RED,borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center'}}>
            <img src={LOGO} style={{width:32,height:32,objectFit:'contain'}}/>
          </div>
          <span style={{fontFamily:DM,fontWeight:700,fontSize:16,color:'rgba(0,0,0,0.55)',letterSpacing:'0.12em',textTransform:'uppercase'}}>DoorDash</span>
        </div>

        <div style={{fontFamily:BANG,fontSize:82,lineHeight:0.9,color:'#111',letterSpacing:'0.01em',marginBottom:28}}>
          Play for<br/><span style={{color:RED}}>Plates</span>
        </div>
        <div style={{fontFamily:DM,fontWeight:300,fontSize:22,color:'rgba(0,0,0,0.55)',lineHeight:1.5,marginBottom:52}}>Match the pairs.<br/>Watch your discount grow.</div>

        <div style={{
          background:RED,borderRadius:28,padding:'28px 36px',
          boxShadow:`0 20px 60px ${RED}55`,
          transform:`scale(${popScale})`,transformOrigin:'left center',
        }}>
          <div style={{fontFamily:MONO,fontSize:15,color:'rgba(255,255,255,0.65)',letterSpacing:'0.20em',textTransform:'uppercase',marginBottom:8}}>Score</div>
          <div style={{fontFamily:BANG,fontSize:160,lineHeight:0.85,color:WHITE,letterSpacing:'-0.01em'}}>{score}</div>
          <div style={{marginTop:10,fontFamily:DM,fontWeight:700,fontSize:18,color:'rgba(255,255,255,0.7)',opacity:score>0?1:0}}>
            {score>=700?'Earning 30% OFF! 🎉':score>=350?'Keep going →':''}
          </div>
        </div>

        <div style={{display:'flex',gap:8,marginTop:28}}>
          {EMOJIS.map((_,i)=>(
            <div key={i} style={{flex:1,height:5,borderRadius:4,background:i<matchedCount?RED:'rgba(0,0,0,0.15)',transition:'background 0.3s ease'}}/>
          ))}
        </div>
        <div style={{marginTop:10,fontFamily:DM,fontSize:14,color:'rgba(0,0,0,0.45)',fontWeight:600}}>{matchedCount}/{EMOJIS.length} pairs</div>
      </div>

      <div style={{position:'absolute',left:480,top:0,right:0,bottom:0,display:'flex',alignItems:'center',justifyContent:'center',padding:'32px 48px'}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,152px)',gridTemplateRows:'repeat(3,190px)',gap:22}}>
          {CARDS.map((emoji,i)=>{
            const cardIn = eop(t, 13.1+i*0.06, 13.7+i*0.06);
            return (
              <div key={i} style={{opacity:cardIn,transform:`scale(${0.65+cardIn*0.35}) translateY(${(1-cardIn)*20}px)`}}>
                <MemCard emoji={emoji} state={states[i]} flashAge={matchFlashAge[i]}/>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function TransitionC({t}){
  if(t < 19.6 || t >= 20.9) return null;
  const p  = nm(t,19.6,20.9);
  const ep = Easing.easeInOutExpo(p);
  const r  = lr(0,200,ep);
  const cols=[RED,YELLOW,PINK,WHITE];
  const col = cols[Math.floor(Math.min(p*3.99,3.99))%4];
  return (
    <div style={{
      position:'absolute',inset:0,zIndex:55,
      background:col,
      clipPath:`circle(${r}vmax at 50% 50%)`,
      pointerEvents:'none',
    }}/>
  );
}

function Frame4({t}){
  const p  = nm(t,21.0,25.0);
  const l1 = eob(t, 21.1, 21.65);
  const l2 = eob(t, 21.5, 22.1);
  const l3 = eop(t, 22.0, 22.7);
  const sub= eop(t, 22.6, 23.4);
  const tag= eop(t, 23.2, 23.9);

  return (
    <div style={{width:'100%',height:'100%',background:PINK,position:'relative',overflow:'hidden',display:'flex',alignItems:'center'}}>
      <div style={{
        position:'absolute',right:-60,bottom:-140,
        fontFamily:BANG,fontSize:700,color:'rgba(255,255,255,0.10)',
        lineHeight:1,userSelect:'none',letterSpacing:'-0.02em',
      }}>WIN</div>

      <div style={{position:'absolute',top:-100,right:-100,width:500,height:500,borderRadius:'50%',background:'rgba(255,255,255,0.14)'}}/>
      <div style={{position:'absolute',top:60,right:60,width:280,height:280,borderRadius:'50%',background:'rgba(255,48,8,0.22)'}}/>

      <div style={{padding:'0 120px',position:'relative',zIndex:5}}>
        <div style={{fontFamily:MONO,fontSize:20,color:'rgba(255,255,255,0.55)',letterSpacing:'0.22em',textTransform:'uppercase',marginBottom:44,opacity:eop(t,21.0,21.3)}}>
          DoorDash — Play for Plates
        </div>

        <div style={{overflow:'hidden',display:'block'}}>
          <div style={{transform:`translateY(${(1-l1)*108}%)`,fontFamily:BANG,fontSize:210,lineHeight:0.86,color:WHITE,display:'block',letterSpacing:'0.01em'}}>EXCITING</div>
        </div>
        <div style={{overflow:'hidden',display:'block'}}>
          <div style={{transform:`translateY(${(1-l2)*108}%)`,display:'flex',alignItems:'center',gap:28}}>
            <span style={{fontFamily:BANG,fontSize:210,lineHeight:0.86,color:YELLOW,letterSpacing:'0.01em'}}>OFFERS</span>
            <span style={{fontFamily:DM,fontWeight:900,fontStyle:'italic',fontSize:100,color:'rgba(255,255,255,0.7)',lineHeight:0.9}}>await.</span>
          </div>
        </div>

        <div style={{
          marginTop:52,fontFamily:DM,fontWeight:300,fontSize:46,
          color:'rgba(255,255,255,0.85)',lineHeight:1.45,
          opacity:sub,transform:`translateY(${(1-sub)*24}px)`,
        }}>
          Play big.<br/>
          <span style={{fontWeight:900,color:WHITE}}>Win bigger.</span>
        </div>

        <div style={{
          marginTop:52,display:'flex',alignItems:'center',gap:24,
          opacity:tag,transform:`translateY(${(1-tag)*16}px)`,
        }}>
          <div style={{width:52,height:52,background:WHITE,borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 8px 32px rgba(0,0,0,0.15)'}}>
            <img src={LOGO} style={{width:34,height:34,objectFit:'contain'}}/>
          </div>
          <div style={{fontFamily:DM,fontWeight:800,fontSize:28,color:WHITE,letterSpacing:'0.08em'}}>DOORDASH</div>
          <div style={{width:6,height:6,borderRadius:'50%',background:'rgba(255,255,255,0.5)'}}/>
          <div style={{fontFamily:MONO,fontSize:20,color:'rgba(255,255,255,0.65)',letterSpacing:'0.12em'}}>2025</div>
        </div>
      </div>
    </div>
  );
}

function PlayForPlates(){
  const t = useTime();
  return (
    <div style={{width:'100%',height:'100%',position:'relative',overflow:'hidden',background:WHITE}}>
      <div style={{position:'absolute',inset:0,display:(t>=5.5&&t<12.2)?'block':'none'}}><Frame2 t={t}/></div>
      <div style={{position:'absolute',inset:0,display:t<6.5?'block':'none'}}><Frame1 t={t}/></div>
      <div style={{position:'absolute',inset:0,display:(t>=12.6&&t<20.2)?'block':'none'}}><Frame3 t={t}/></div>
      <div style={{position:'absolute',inset:0,zIndex:10,display:t>=20.9?'block':'none'}}><Frame4 t={t}/></div>
      <TransitionA t={t}/>
      <TransitionB t={t}/>
      <TransitionC t={t}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <Stage width={1920} height={1080} duration={TOTAL} background={WHITE}>
    <PlayForPlates/>
  </Stage>
);
</script>
</body>
